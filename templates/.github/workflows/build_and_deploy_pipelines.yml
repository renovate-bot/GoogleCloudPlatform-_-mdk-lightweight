name: "Build, Deploy, and Submit Training Pipeline"

on:
  workflow_call:
    inputs:
      environment:
        description: "GCP environment to run the workflow in. Acceptable values are 'dev', stage', or 'prod'."
        required: true
        type: string
      codeql-runner-list:
        default: '["ubuntu-latest"]'
        description: "A comma seperated list of GitHub Action Runners where the codeql scanning are to run."
        required: false
        type: string
      ignore-wiz-scan-result:
        description: Boolean indicating if Wiz.io should be temporarily bypassed
        type: boolean
        required: false
        default: false
      pipeline-name:
        description: "Pipeline name to trigger."
        required: false
        type: string
        default: ""

jobs:
  setup-scan:
    if: github.event_name == 'pull_request'
    environment: ${{ inputs.environment }}
    runs-on: ${{ fromJson(inputs.codeql-runner-list) }}
    outputs:
      environments: ${{ steps.build-environments.outputs.result }}
    steps:
      - name: Determine codeql matrix
        id: build-environments
        run: |
          echo "result=['${{ vars.language }}']" >>$GITHUB_OUTPUT

  scan:
    name: Scan
    if: github.event_name == 'pull_request'
    environment: ${{ inputs.environment }}
    runs-on: ${{ fromJson(inputs.codeql-runner-list) }}
    needs: setup-scan
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson(needs.setup-scan.outputs.environments) }}
        # CodeQL supports [ 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'swift' ]
        # Use only 'java-kotlin' to analyze code written in Java, Kotlin or both
        # Use only 'javascript-typescript' to analyze code written in JavaScript, TypeScript or both
        # Learn more about CodeQL language support at https://aka.ms/codeql-docs/language-support
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

        # Initializes the CodeQL tools for scanning.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          source-root: ${{ inputs.working-dir }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"

  determine-pipelines-and-images:
    name: "Determine Pipelines and Images to Build"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      matrix: ${{ steps.get_images.outputs.matrix }}
      pipelines: ${{ steps.get_pipelines_git.outputs.pipelines || steps.get_pipelines_workflow_dispatch.outputs.pipelines }}
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Install lightweight tooling (yq, jq)"
        run: |
          # Install yq (portable binary, very fast)
          mkdir -p $HOME/.local/bin
          wget -qO $HOME/.local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/.local/bin/yq
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          sudo apt-get update && sudo apt-get install -y jq || true

      - name: "Get List of Pipelines to Run for Pushes and PRs"
        id: get_pipelines_git
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
        run: |
          echo "Discovering pipelines listed in ci_cd sections..."
          # 1. Find all config.yml files.
          # 2. Use yq to extract all values in ci_cd.pipeline_names list.
          # 3. Sort, Unique, and convert to JSON array.
          PIPELINES_JSON=$(find model_products examples/model_products -maxdepth 4 -name "config.yml" -exec yq eval '.ci_cd.pipeline_names[] | select(. != null)' {} + | grep -v "^---$" | sort | uniq | jq -R . | jq -sc .)
          echo "Found pipelines: $PIPELINES_JSON"
          echo "pipelines=$PIPELINES_JSON" >> $GITHUB_OUTPUT

      - name: "Get List of Pipelines from workflow dispatch"
        id: get_pipelines_workflow_dispatch
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          PIPELINES_JSON='["${{ inputs.pipeline-name }}"]'
          echo "Found pipelines: $PIPELINES_JSON"
          echo "pipelines=$PIPELINES_JSON" >> $GITHUB_OUTPUT

      - name: "Determine which images to build from all pipelines"
        id: get_images
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          PIPELINES_JSON: ${{ steps.get_pipelines_git.outputs.pipelines || steps.get_pipelines_workflow_dispatch.outputs.pipelines }}
        run: |
          echo "Pipelines to check: $PIPELINES_JSON"
          MATRIX="[]"

          for pipeline_name in $(echo "$PIPELINES_JSON" | jq -r '.[]'); do
            echo "--- Processing pipeline: $pipeline_name ---"

            # 1. Find the actual directory for this pipeline (e.g., .../pipelines/xgb_training_pipeline)
            PIPELINE_DIR=$(find model_products examples/model_products -maxdepth 4 -type d -name "$pipeline_name" | head -n 1)

            if [ -z "$PIPELINE_DIR" ]; then
              echo "Warning: Directory for pipeline '$pipeline_name' not found. Skipping."
              continue
            fi

            # 2. derive Product Root by going up two levels from .../pipelines/<pipeline_name>
            # PRODUCT_ROOT will be something like "examples/model_products/xgb_example"
            PRODUCT_ROOT=$(dirname $(dirname "$PIPELINE_DIR"))

            CONFIG_FILE="$PRODUCT_ROOT/config/pipeline_config.yml"
            STATE_FILE="$PRODUCT_ROOT/state/${ENVIRONMENT}.yml"

            # 3. Validate files exist before trying to read them
            if [ ! -f "$CONFIG_FILE" ]; then
              echo "Warning: Shared config not found at $CONFIG_FILE. Skipping $pipeline_name."
              continue
            fi
            if [ ! -f "$STATE_FILE" ]; then
              echo "Warning: State file not found at $STATE_FILE. Skipping $pipeline_name."
              continue
            fi

            # 4. Get AR_REPO from state/{env}.yml
            AR_REPO=$(yq eval '.artifact_registry_repo // ""' "$STATE_FILE")

            if [ -z "$AR_REPO" ]; then
              echo "Warning: 'artifact_registry_repo' missing in $STATE_FILE. Skipping."
              continue
            fi

            # 5. Get ALL images defined for this model product
            # Since pipeline_config is shared, we assume any trigger for this product
            # should ensure required images for the product are built.
            IMAGES_JSON=$(yq eval -o=json '.images' "$CONFIG_FILE" | jq --arg ar_repo "$AR_REPO" 'to_entries | map({image_url: ($ar_repo + "/" + (.value.artifact | split(":")[0])), build_config_dir: .value.build_config_dir})')

            if [ -z "$IMAGES_JSON" ] || [ "$IMAGES_JSON" == "[]" ] || [ "$IMAGES_JSON" == "null" ]; then
              echo "No images found in $CONFIG_FILE for $pipeline_name."
              continue
            fi

            # 6. Merge into main matrix
            MATRIX=$(echo "$MATRIX" | jq --argjson new_images "$IMAGES_JSON" '. + $new_images')
          done

          # Deduping at the end handles cases where multiple pipelines from the
          # same product were triggered, ensuring we don't build the same image twice.
          UNIQUE_MATRIX=$(echo "$MATRIX" | jq -c 'unique')
          echo "Final unique matrix: $UNIQUE_MATRIX"
          echo "matrix=$UNIQUE_MATRIX" >> $GITHUB_OUTPUT

  build-container:
    name: "Build Image (${{ matrix.image_url }})"
    runs-on: ubuntu-latest
    needs: determine-pipelines-and-images
    environment: ${{ inputs.environment }}
    permissions:
      id-token: "write"
      contents: "read"
    outputs:
      image_uri: ${{ steps.upload_image_artifact.outputs.artifact_name }}.txt
      artifact_name: ${{ steps.upload_image_artifact.outputs.artifact_name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.determine-pipelines-and-images.outputs.matrix) }}
    env:
      ENVIRONMENT: ${{ inputs.environment }}
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Install lightweight tooling (yq)"
        run: |
          mkdir -p $HOME/.local/bin
          wget -qO $HOME/.local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/.local/bin/yq
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: "Configure Docker"
        run: |
          HOST=$(echo "${{ matrix.image_url }}" | cut -d'/' -f1)
          gcloud auth configure-docker $HOST --quiet

      - name: "Update config.yml with Git metadata"
        if: ${{ github.event_name != 'pull_request' }}
        env:
          BUILD_DIR: ${{ matrix.build_config_dir }}
        run: |
          PRODUCT_CONFIG=$(find "$BUILD_DIR" -maxdepth 4 -name "config.yml" 2>/dev/null || true)
          if [ -z "$PRODUCT_CONFIG" ]; then
             CURRENT_DIR="$BUILD_DIR"
             while [[ "$CURRENT_DIR" != "." && "$CURRENT_DIR" != "/" ]]; do
                 if [ -f "$CURRENT_DIR/config/config.yml" ]; then
                     PRODUCT_CONFIG="$CURRENT_DIR/config/config.yml"
                     break
                 fi
                 CURRENT_DIR=$(dirname "$CURRENT_DIR")
             done
          fi

          if [ -n "$PRODUCT_CONFIG" ] && [ -f "$PRODUCT_CONFIG" ]; then
              echo "Updating metadata in $PRODUCT_CONFIG"
              export TRAINED_BY_EMAIL=$(git --no-pager log -1 --pretty=format:"%ae")

              yq -i \
                '.model_registry.git_repo_url = "${{ github.server_url }}/${{ github.repository }}" |
                 .model_registry.git_commit_hash = "${{ github.sha }}" |
                 .model_registry.git_branch = "${{ github.head_ref || github.ref_name }}" |
                 .model_registry.trained_by = env(TRAINED_BY_EMAIL)' \
                "$PRODUCT_CONFIG"
          else
              echo "Warning: Could not locate config.yml related to $BUILD_DIR. Skipping metadata update."
          fi

      - name: "Check for Existing Image (Native)"
        id: check_image
        if: github.event_name != 'pull_request'
        run: |
          IMAGE_URI_WITH_TAG="${{ matrix.image_url }}:${{ github.sha }}"
          echo "Checking for image: $IMAGE_URI_WITH_TAG"

          # Use 'docker manifest inspect' instead of 'gcloud artifacts ... describe'
          # If it returns exit code 0, the image exists.
          if docker manifest inspect "$IMAGE_URI_WITH_TAG" &> /dev/null; then
             echo "CACHE HIT: Image tag already exists on registry."
             echo "exists=true" >> $GITHUB_OUTPUT
          else
             echo "CACHE MISS: Image not found on registry."
             echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: "Build and Push Docker Image"
        if: steps.check_image.outputs.exists != 'true' || github.event_name == 'pull_request'
        env:
          IMAGE_URL: ${{ matrix.image_url }}
          BUILD_DIR: ${{ matrix.build_config_dir }}
          GIT_SHA: ${{ github.sha }}
        run: |
          echo "--- Building Image: $IMAGE_URL ---"

          # 1. Determine output mode based on event type
          # For PRs: --load (keep locally for inspection/scanning)
          # For others: --push (upload directly to registry during build)
          OUTPUT_MODES="--load"
          if [ "${{ github.event_name }}" != "pull_request" ]; then
             OUTPUT_MODES="--push"
          fi

          # 2. Buildx command handles both building AND pushing/loading based on the flag
          docker buildx build . \
            --file "$BUILD_DIR/Dockerfile" \
            --tag "$IMAGE_URL" \
            --tag "$IMAGE_URL:$GIT_SHA" \
            --cache-from "$IMAGE_URL" \
            --platform "linux/amd64" \
            --progress=plain \
            --build-arg HTTP_PROXY="$HTTP_PROXY" \
            --build-arg HTTPS_PROXY="$HTTPS_PROXY" \
            --build-arg NO_PROXY="$NO_PROXY" \
            --output type=image,compression=zstd,force-compression=true,oci-mediatypes=true,push=true \
            $OUTPUT_MODES


      - name: "Generate Output Digest"
        id: get_digest
        run: |
          IMAGE_NAME=$(basename "${{ matrix.image_url }}")
          IMAGE_URI_WITH_DIGEST=""
          FULL_IMAGE_TAG="${{ matrix.image_url }}:${{ github.sha }}"

          if [ "${{ github.event_name }}" == "pull_request" ]; then
             # Case 3: PR build (local only, NOT pushed).
             # Use the explicit tag as there is no remote digest.
             echo "PR build: using local tag."
             IMAGE_URI_WITH_DIGEST="${FULL_IMAGE_TAG}"
          else
             # Case 1 & 2: Cache hit OR Freshly pushed.
             # In both cases, the image exists remotely, so we can query it.
             # 'docker buildx imagetools inspect' works reliably for remote images.
             echo "Querying registry for digest of $FULL_IMAGE_TAG..."

             # Grep for the "Digest:" line and grab the second word
             DIGEST=$(docker buildx imagetools inspect "$FULL_IMAGE_TAG" | grep "^Digest:" | head -n 1 | awk '{print $2}')

             if [ -z "$DIGEST" ]; then
                echo "Error: Could not find digest for $FULL_IMAGE_TAG"
                exit 1
             fi

             IMAGE_URI_WITH_DIGEST="${{ matrix.image_url }}@$DIGEST"
          fi

          echo "Final Image URI: $IMAGE_URI_WITH_DIGEST"
          echo -n "$IMAGE_URI_WITH_DIGEST" > "${IMAGE_NAME}.txt"
          echo "artifact_name=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "image_filename=${IMAGE_NAME}.txt" >> $GITHUB_OUTPUT

      - name: "Upload image digest to artifact"
        id: upload_image_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.get_digest.outputs.artifact_name }}
          path: ${{ steps.get_digest.outputs.image_filename }}


  deploy-pipeline:
    name: "Compile and Trigger Pipeline"
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: [build-container, determine-pipelines-and-images]
    permissions:
      id-token: "write"
      contents: "read"
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Install Tooling (uv, yq, jq)"
        run: |
          mkdir -p $HOME/.local/bin

          # Install yq
          wget -qO $HOME/.local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x $HOME/.local/bin/yq

          # Install uv
          curl -LsSf https://astral.sh/uv/install.sh | sh

          # Install jq
          if ! command -v jq &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y jq
          fi

          # Add to PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: "Cache uv Python tools"
        uses: actions/cache@v4
        with:
          path: ~/.local/share/uv/python
          key: uv-python-${{ runner.os }}-v2

      - name: "Cache Virtual Environment"
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-v2-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-v2-

      - name: "Install Dependencies"
        run: |
          # This automatically downloads Python 3.11 if not in the cache above
          uv sync --no-dev --python 3.11

      - name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          token_format: "access_token"
          workload_identity_provider: "${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          service_account: "${{ secrets.SERVICE_ACCOUNT }}"

      - name: "Set up Cloud SDK"
        id: check_gcloud
        run: |
          if command -v gcloud &> /dev/null; then
            echo "gcloud found."
            echo "installed=true" >> $GITHUB_OUTPUT
          else
            echo "gcloud not found."
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: "Install Cloud SDK (Conditional)"
        if: steps.check_gcloud.outputs.installed != 'true'
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Configure gcloud Auth"
        if: steps.check_gcloud.outputs.installed == 'true'
        run: |
          gcloud auth login --cred-file="$GOOGLE_APPLICATION_CREDENTIALS" --quiet
          gcloud config set project "${{ vars.GCP_PROJECT_ID }}" --quiet

      - name: "Download image digest artifacts"
        uses: actions/download-artifact@v4
        with:
          path: image-digests

      - name: "Compile and Trigger Each Pipeline"
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: ${{ inputs.environment }}
          GCS_BUCKET: ${{ vars.GCS_BUCKET }}
          PUB_SUB_TOPIC: ${{ vars.PUB_SUB_TOPIC }}
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          PIPELINES_JSON: ${{ needs.determine-pipelines-and-images.outputs.pipelines }}
        run: |
          source .venv/bin/activate

          if [[ -z "$PIPELINES_JSON" || "$PIPELINES_JSON" == "null" ]]; then
            echo "Error: No pipelines found to process."
            exit 1
          fi

          for pipeline_name in $(echo "$PIPELINES_JSON" | jq -r '.[]'); do
            if [[ -z "$pipeline_name" || "$pipeline_name" == "---" ]]; then continue; fi

            echo "--- Processing pipeline: $pipeline_name ---"

            PIPELINE_DIR=$(find model_products examples/model_products -maxdepth 4 -type d -name "$pipeline_name" | head -n 1)
            if [[ -z "$PIPELINE_DIR" ]]; then continue; fi

            PRODUCT_ROOT=$(dirname $(dirname "$PIPELINE_DIR"))
            CONFIG_FILE="$PRODUCT_ROOT/config/config.yml"
            STATE_FILE="$PRODUCT_ROOT/state/${ENVIRONMENT}.yml"

            AR_REPO=$(yq eval '.artifact_registry_repo // ""' "$STATE_FILE")
            EXPERIMENT_NAME=$(yq eval '.experiment_name // ""' "$STATE_FILE")

            CRON_SCHEDULE=""
            if [[ "$pipeline_name" == *"training"* ]]; then
               CRON_SCHEDULE=$(yq eval '.training.cron_schedule // ""' "$CONFIG_FILE")
            elif [[ "$pipeline_name" == *"inference"* ]]; then
               CRON_SCHEDULE=$(yq eval '.inference.cron_schedule // ""' "$CONFIG_FILE")
            fi

            if [ -z "$AR_REPO" ] || [ -z "$EXPERIMENT_NAME" ]; then
               echo "Warning: Missing AR_REPO or EXPERIMENT_NAME for $pipeline_name. Skipping."
               continue
            fi

            ADDITIONAL_LABELS_JSON=$(yq eval -o=json ".additional_pipeline_labels[\"$pipeline_name\"] // {}" "$CONFIG_FILE")
            echo "Additional Labels found: $ADDITIONAL_LABELS_JSON"

            TAG_ARGS=""
            if ls image-digests/*/*.txt 1> /dev/null 2>&1; then
              for digest_file in image-digests/*/*.txt; do
                TAG_ARGS="$TAG_ARGS --tag $(cat "$digest_file")"
              done
            fi

            echo "Compiling pipeline..."
            python -m mdk.pipeline_tools.compile_pipeline "$PIPELINE_DIR" "$AR_REPO" $TAG_ARGS

            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            SPEC_FILENAME="${PIPELINE_DIR}/pipeline.yml"
            PIPELINE_SPEC_GCS_URI="${GCS_BUCKET}/pipelines/$pipeline_name/${pipeline_name}_$TIMESTAMP.yml"

            gsutil cp "$SPEC_FILENAME" "$PIPELINE_SPEC_GCS_URI"
            GIT_COMMIT_HASH="$(git rev-parse --short HEAD)"

            # --- Updated Message Construction using jq ---
            # 1. Define base labels
            BASE_LABELS="{\"pipeline_trigger_source\": \"github_actions\", \"git_commit_hash\": \"$GIT_COMMIT_HASH\"}"

            # 2. Merge base labels with additional labels from config
            FINAL_LABELS=$(echo "$BASE_LABELS" | jq --argjson extra "$ADDITIONAL_LABELS_JSON" '. + $extra')

            # 3. Build the final JSON object safely
            MESSAGE_JSON=$(jq -n \
                  --arg uri "$PIPELINE_SPEC_GCS_URI" \
                  --arg exp "$EXPERIMENT_NAME" \
                  --arg env "$ENVIRONMENT" \
                  --argjson lbl "$FINAL_LABELS" \
                  '{
                    pipeline_spec_uri: $uri,
                    experiment_name: $exp,
                    parameters: {environment: $env},
                    labels: $lbl
                  }')

            if [ -n "$CRON_SCHEDULE" ] && [ "$CRON_SCHEDULE" != "null" ]; then
                MESSAGE_JSON=$(echo "$MESSAGE_JSON" | jq --arg schedule "$CRON_SCHEDULE" '. + {"cron_schedule": $schedule}')
            fi

            echo "Publishing Message: $MESSAGE_JSON"
            gcloud pubsub topics publish "$PUB_SUB_TOPIC" --project="$GCP_PROJECT_ID" --message="$MESSAGE_JSON"
          done
